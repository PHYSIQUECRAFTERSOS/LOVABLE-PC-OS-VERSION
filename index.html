    <!-- Pre-paint theme bootstrap: runs before <body> renders to prevent
         a flash of the wrong theme on cold launch. Resolves to 'dark'
         for any user with no stored preference. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pc.theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          var root = document.documentElement;
          root.classList.add(t);
          root.setAttribute('data-theme', t);
          var bg = t === 'dark' ? '#0a0a0a' : '#f7f6f3';
          root.style.backgroundColor = bg;
          root.style.cssText += ';overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0';
          // Patch the meta theme-color to match before paint.
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', bg);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.Capacitor || (navigator.userAgent && navigator.userAgent.includes('Capacitor'))) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) { reg.unregister(); });
          });
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      } else if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function(err) {
          console.warn('Service Worker registration failed:', err);
        });
      }
    </script>
  </body>
